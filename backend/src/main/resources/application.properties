spring.application.name=hospital-api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=aman@123

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Key must be at least 256 bits (32 chars) for HS256
jwt.secret=lifecare_secret_key_2024_which_should_be_long_enough_for_hs256
jwt.expiration=86400000

# Email Configuration (Mock/Console for now, can be configured later)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amansingh
spring.mail.password=123456789
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
